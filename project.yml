# xcodegen spec for the SlothIOS app. Run `xcodegen generate` to
# produce SlothIOS.xcodeproj. The .xcodeproj is gitignored — this YAML
# is the authoritative project definition.

name: SlothIOS

options:
  bundleIdPrefix: io.river.sloth
  deploymentTarget:
    iOS: "17.0"
    iPadOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES

packages:
  SlothCore:
    path: .

targets:
  SlothIOS:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Tests/**"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: sloth
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # An empty UILaunchScreen dict opts the app into modern launch
        # behaviour. Without it iOS treats the app as legacy and runs
        # it in iPhone-4 (320×480) compatibility mode — the "small
        # square in the middle of the screen" symptom.
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        ITSAppUsesNonExemptEncryption: false
        # Bonjour service types this app browses (iOS 14+ requirement).
        NSBonjourServices:
          - _sloth._tcp
        # Shown in the iOS "Local Network" permission prompt the first
        # time discovery runs or the first time NWConnection tries a
        # peer-to-peer TCP connect to a LAN address.
        NSLocalNetworkUsageDescription: "Find sloth instances on your local network."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.sloth.ios
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - package: SlothCore
        product: SlothCore

  SlothIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.river.sloth.ios.tests
    dependencies:
      - target: SlothIOS
      - package: SlothCore
        product: SlothCore

schemes:
  SlothIOS:
    build:
      targets:
        SlothIOS: all
        SlothIOSTests: [test]
    test:
      targets:
        - SlothIOSTests
    run:
      config: Debug
